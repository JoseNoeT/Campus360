{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Campus360{% endblock %}</title>
    <!-- Anti-flash: apply saved theme before first paint -->
    <script>!function(){var t=localStorage.getItem('campus360-theme')||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);}();</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- 1. Design tokens & base — loaded first -->
    <link rel="stylesheet" href="{% static 'css/base/reset.css' %}">
    <link rel="stylesheet" href="{% static 'css/base/variables.css' %}">
    <!-- 2. Dark mode Bootstrap overrides -->
    <link rel="stylesheet" href="{% static 'css/base/dark.css' %}">
    <!-- 3. UX enhancements (13 laws) -->
    <link rel="stylesheet" href="{% static 'css/base/ux.css' %}">
    <!-- 4. Layout + components -->
    <link rel="stylesheet" href="{% static 'css/layout/grid.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/buttons.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/cards.css' %}">
    {% block styles %}{% endblock %}
</head>
<body class="app-shell">
    <a href="#main-content" class="skip-link">Saltar al contenido</a>
    {% include 'Campus360_app/components/navbar.html' %}

    <main id="main-content" class="app-main container py-4">
        {% block content %}{% endblock %}
    </main>

    {% include 'Campus360_app/components/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'JQuery/theme-toggle.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
