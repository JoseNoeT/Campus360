{% extends 'Campus360_app/base/base.html' %}
{% load static %}

{% block title %}Biblioteca360 | Campus360{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/pages/biblioteca.css' %}">
{% endblock %}

{% block content %}
<div class="biblioteca-page">
<!-- Buscador -->
<section class="mb-4 biblioteca-hero">
    <h1 class="h3 mb-1">Biblioteca360</h1>
    <p class="text-muted mb-4">Busca tu libro favorito en el catálogo global.</p>
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="input-group" role="search">
                <label for="search-box" class="visually-hidden">Buscar libro</label>
                <input id="search-box"
                       type="search"
                       class="form-control"
                       placeholder="Ej: Python, Calculus, Historia..."
                       autocomplete="off"
                       aria-label="Buscar libro en Biblioteca360">
                <button id="search" class="btn btn-accent" type="button"
                        aria-label="Iniciar búsqueda">
                    Buscar
                </button>
            </div>
        </div>
    </div>
</section>

<!-- Estado live region para lectores de pantalla -->
<div id="biblioteca-announcer" aria-live="polite" aria-atomic="true" class="visually-hidden"></div>

<!-- Resultados -->
<section class="book-list" aria-label="Resultados de búsqueda">
    <h2 class="h5 mb-3">Resultados</h2>
    <div id="list-output">
        <div class="row g-3"></div>
    </div>
</section>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'js/pages/biblioteca.js' %}"></script>
{% endblock %}
