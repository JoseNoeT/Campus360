{% extends 'Campus360_app/base/base.html' %}
{% load static %}

{% block title %}Recuperar contraseña | Campus360{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/pages/auth.css' %}">
{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <article class="auth-card">
        <h1 class="h4 mb-3">Cambiar contraseña</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="current_password" class="form-label">Contraseña actual</label>
                <input type="password" class="form-control" id="current_password" name="current_password" required>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">Nueva contraseña</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100">Cambiar contraseña</button>
        </form>
        <p class="small text-muted mt-3 mb-0">
            <a href="{% url 'login' %}">← Volver al inicio de sesión</a>
        </p>
    </article>
</section>
{% endblock %}
