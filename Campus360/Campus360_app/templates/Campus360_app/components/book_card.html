<article class="book-card card h-100 shadow-sm">
    <img src="{{ libro.imagen }}" class="card-img-top book-cover" alt="{{ libro.titulo }}">
    <div class="card-body d-flex flex-column">
        <h3 class="h6 card-title mb-2">{{ libro.titulo }}</h3>
        <p class="text-muted small mb-1">{{ libro.autor }}</p>
        <p class="fw-semibold mb-3">${{ libro.precio }}</p>
        <button class="btn btn-accent mt-auto boton-item" type="button">Agregar al carrito</button>
    </div>
</article>
